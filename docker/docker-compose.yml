services:
  postgres:
    image: postgres:18-alpine
    container_name: postgres_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: expanse
      POSTGRES_PASSWORD: iamroot
      POSTGRES_DB: smart_back
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expanse -d smart-backend"]
      interval: 10s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  smart_back:
    image: smart-back
    container_name: smart-back
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - ollama
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=smart_back
      - DB_USERNAME=expanse
      - DB_PASSWORD=iamroot
      - OLLAMA_HOST=ollama
      - OLLAMA_PORT=11434
      - OLLAMA_API_MAX_ATTEMPTS=5

volumes:
  ollama_data:
  postgres_data: