spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smart_back}
spring.datasource.username=${DB_USERNAME:expanse}
spring.datasource.password=${DB_PASSWORD:iamroot}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/init.sql

smart-back.ollama.api.url=http://${OLLAMA_HOST:localhost}:${OLLAMA_PORT:11434}/api/chat
smart-back.ollama.api.max-attempts=${OLLAMA_API_MAX_ATTEMPTS:5}